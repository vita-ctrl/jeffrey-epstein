<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>BaaS — Firebase</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --surface2: #1c1c20;
      --border: #2a2a30;
      --accent: #5b6ef5;
      --accent2: #f55b8a;
      --text: #e8e8f0;
      --muted: #6b6b7a;
      --success: #4ade80;
      --danger: #f87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* Grid noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(91,110,245,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,110,245,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .header-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .header h1 span { color: var(--accent); }

    /* Panel */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .panel-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* Inputs */
    .field-row { display: flex; gap: 10px; margin-bottom: 10px; }
    input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      padding: 11px 14px;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--accent); }

    /* Buttons */
    .btn {
      padding: 11px 18px;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
    }
    .btn-primary:hover { background: #4a5de8; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Search bar */
    .search-wrap {
      position: relative;
      margin-bottom: 20px;
    }
    .search-wrap input {
      width: 100%;
      padding-left: 38px;
    }
    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }

    /* Feed */
    #feed { display: flex; flex-direction: column; gap: 10px; }

    /* Post card */
    .post {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      animation: fadeIn 0.3s ease;
      transition: border-color 0.2s;
    }
    .post:hover { border-color: #3a3a45; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .post-info { flex: 1; min-width: 0; }
    .post-name {
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .post-email {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .post-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
    }

    .post-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .like-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .like-btn:hover { border-color: var(--accent); color: var(--accent); }

    .delete-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 32px; height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .delete-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(248,113,113,0.08);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
    }

    /* Status toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-family: 'IBM Plex Mono', monospace;
      padding: 10px 20px;
      border-radius: 30px;
      transition: transform 0.3s ease;
      z-index: 100;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="header">
    <div class="header-dot"></div>
    <h1>Cloud <span>Feed</span></h1>
  </div>

  <div class="panel">
    <div class="panel-label">// новая запись</div>
    <div class="field-row">
      <input type="text" id="name" placeholder="Имя профиля">
      <input type="email" id="email" placeholder="Email">
    </div>
    <button class="btn btn-primary" id="mainBtn">Опубликовать в облако</button>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Поиск по имени или email...">
  </div>

  <div id="feed"></div>

</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, query, orderBy, onSnapshot,
    serverTimestamp, updateDoc, deleteDoc, doc, increment
  } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBK0Bq-hvxwqrYeX-ThgbatMsjnFXxsld8",
    authDomain: "jeffrey-epstein-ed456.firebaseapp.com",
    projectId: "jeffrey-epstein-ed456",
    storageBucket: "jeffrey-epstein-ed456.firebasestorage.app",
    messagingSenderId: "312094362251",
    appId: "1:312094362251:web:c44b2d36dcbc7c3adb228e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ─── Утилита: toast-уведомление ────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ─── Хранилище всех постов (для клиентской фильтрации) ─────────────────────
  let allPosts = [];

  window.deletePost = async (id) => {
    const docRef = doc(db, "requests", id);
    try {
      await deleteDoc(docRef);
      showToast("✓ Запись удалена");
    } catch (e) {
      // Security Rule запрещает удаление → попадаем сюда
      showToast("✗ Удаление запрещено правилами сервера");
      console.error("Delete blocked:", e.message);
    }
  };

  function filterPosts() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    if (!q) return renderFeed(allPosts);              // пустой запрос → всё
    const filtered = allPosts.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.email.toLowerCase().includes(q)
    );
    renderFeed(filtered);
  }

  document.getElementById('searchInput').addEventListener('input', filterPosts);

  function renderFeed(posts) {
    const feed = document.getElementById('feed');
    if (!posts.length) {
      feed.innerHTML = `<div class="empty">// нет результатов</div>`;
      return;
    }
    feed.innerHTML = posts.map(p => `
      <div class="post">
        <div class="post-info">
          <div class="post-name">${escapeHtml(p.name)}</div>
          <div class="post-email">${escapeHtml(p.email)}</div>
          <div class="post-time">${p.time}</div>
        </div>
        <div class="post-actions">
          <button class="like-btn" onclick="processLike('${p.id}')">
            👍 ${p.likes || 0}
          </button>
          <button class="delete-btn" onclick="deletePost('${p.id}')" title="Удалить">
            ✕
          </button>
        </div>
      </div>`).join('');
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  window.processLike = async (id) => {
    const docRef = doc(db, "requests", id);
    try {
      await updateDoc(docRef, { likes: increment(1) });
    } catch (e) {
      console.error("Like error:", e.message);
    }
  };

  document.getElementById('mainBtn').onclick = async () => {
    const btn = document.getElementById('mainBtn');
    btn.disabled = true;
    try {
      await addDoc(collection(db, "requests"), {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        likes: 0,
        timestamp: serverTimestamp()
      });
      document.getElementById('name').value = "";
      document.getElementById('email').value = "";
      showToast("✓ Опубликовано");
    } catch (e) {
      showToast("✗ Ошибка валидации сервера");
    }
    btn.disabled = false;
  };

  const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snapshot) => {
    allPosts = snapshot.docs.map(d => ({
      id: d.id,
      name: d.data().name || '—',
      email: d.data().email || '—',
      likes: d.data().likes || 0,
      time: d.data().timestamp?.toDate().toLocaleTimeString('ru') || '...'
    }));
    filterPosts();
  });
</script>
</body>
</html>
