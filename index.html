<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Статусы группы</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;background:#0d0d14;font-family:"Segoe UI",sans-serif;color:#fff;padding:0 0 80px}

    .header{padding:18px 20px 0;max-width:520px;margin:0 auto}
    .header-label{font-size:0.65rem;letter-spacing:2px;color:#07CA6B;text-transform:uppercase;margin-bottom:4px}
    .header h1{font-size:1.8rem;font-weight:800;line-height:1.1}
    .header h1 span{color:#07CA6B}

    .wrap{max-width:520px;margin:0 auto;padding:0 12px}
    .card{background:#16161f;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:18px 20px;margin-top:14px}

    /* SESSION */
    .sess-label{font-size:0.65rem;letter-spacing:1.5px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:10px}
    .sess-name{font-size:0.95rem;font-weight:600;margin-bottom:8px;text-align:center}
    .sess-timer{font-size:2.4rem;font-weight:800;color:#07CA6B;text-align:center;letter-spacing:-1px;display:flex;align-items:center;justify-content:center;gap:10px}
    .sess-timer svg{flex-shrink:0}
    .sess-status-txt{text-align:center;font-size:0.82rem;font-weight:600;letter-spacing:1px;margin:4px 0 14px;text-transform:uppercase}
    .sess-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .sbtn{padding:11px 6px;border-radius:10px;border:none;font-size:0.82rem;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.15s}
    .sbtn:hover{transform:translateY(-1px);filter:brightness(1.1)}
    .sbtn:active{transform:scale(0.97)}
    .sbtn-start{background:#07CA6B;color:#000}
    .sbtn-end{background:#EA2143;color:#fff}
    .sbtn-logout{background:#2a2a3a;color:rgba(255,255,255,0.5)}

    /* PROFILE */
    .prof-row{display:flex;align-items:center;gap:12px}
    .av-wrap{position:relative;flex-shrink:0}
    .avatar{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;overflow:hidden}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .online-dot{position:absolute;bottom:-2px;right:-2px;width:12px;height:12px;border-radius:50%;border:2px solid #16161f;background:#4b5563;transition:background 0.3s}
    .online-dot.on{background:#07CA6B;animation:pg 2s infinite}
    @keyframes pg{0%,100%{box-shadow:0 0 0 0 rgba(7,202,107,0.5)}50%{box-shadow:0 0 0 4px rgba(7,202,107,0)}}
    .prof-info{flex:1;min-width:0}
    .prof-name{font-weight:700;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .prof-online{font-size:0.75rem;color:#07CA6B;margin-bottom:4px}

    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:14px;border-top:1px solid rgba(255,255,255,0.07);padding-top:14px}
    .stat-cell{text-align:center}
    .stat-val{font-size:1.1rem;font-weight:800;color:#07CA6B}
    .stat-lbl{font-size:0.62rem;letter-spacing:1px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-top:2px}

    /* STATUS PICKER */
    .status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
    .spick{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#1e1e2e;color:rgba(255,255,255,0.7);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:inherit}
    .spick:hover{border-color:rgba(255,255,255,0.25);background:#252535}
    .spick.active{border-color:var(--c);color:var(--c);background:color-mix(in srgb,var(--c) 12%,#1e1e2e)}
    .spick-dot{width:9px;height:9px;border-radius:50%;background:var(--c);flex-shrink:0}

    /* GROUP SUMMARY */
    .group-summary{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid rgba(255,255,255,0.07);padding-top:14px;margin-top:14px}
    .gs-cell{text-align:center}
    .gs-val{font-size:1.2rem;font-weight:800}
    .gs-lbl{font-size:0.62rem;letter-spacing:1px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-top:2px}
    .gs-studying .gs-val{color:#07CA6B}
    .gs-break .gs-val{color:#f59e0b}
    .gs-offline .gs-val{color:rgba(255,255,255,0.4)}

    /* TABS */
    .tabs{display:grid;grid-template-columns:1fr 1fr;background:#1a1a26;border-radius:10px;padding:3px;gap:2px;margin-top:14px}
    .tab{padding:8px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,0.45);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
    .tab.active{background:#252535;color:#fff}
    .panel{display:none}.panel.active{display:block}

    /* USERS */
    .user-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:14px}
    .user-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:#1e1e2e;border:1px solid rgba(255,255,255,0.06);transition:background 0.15s}
    .user-item:hover{background:#252535}
    .av-sm-wrap{position:relative;flex-shrink:0}
    .av-sm{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;overflow:hidden}
    .av-sm img{width:100%;height:100%;object-fit:cover}
    .av-sm-wrap .online-dot{width:10px;height:10px;bottom:-1px;right:-1px}
    .item-info{flex:1;min-width:0}
    .item-name{font-weight:600;font-size:0.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-sub{font-size:0.7rem;color:rgba(255,255,255,0.4);margin-top:1px}
    .status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:0.75rem;font-weight:500;white-space:nowrap}
    .sbdot{width:6px;height:6px;border-radius:50%}
    .badge-studying{background:rgba(7,202,107,0.15);color:#07CA6B}.badge-studying .sbdot{background:#07CA6B}
    .badge-away{background:rgba(232,149,88,0.15);color:#E89558}.badge-away .sbdot{background:#E89558}
    .badge-break{background:rgba(251,191,36,0.15);color:#fbbf24}.badge-break .sbdot{background:#fbbf24}
    .badge-dnd{background:rgba(234,33,67,0.15);color:#EA2143}.badge-dnd .sbdot{background:#EA2143}
    .badge-dnd2{background:rgba(107,114,128,0.15);color:#9ca3af}.badge-dnd2 .sbdot{background:#9ca3af}
    .badge-offline{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.4)}.badge-offline .sbdot{background:rgba(255,255,255,0.3)}

    /* LEADERBOARD */
    .lb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:#1e1e2e;border:1px solid rgba(255,255,255,0.06);margin-top:8px}
    .lb-rank{font-size:1.1rem;width:28px;text-align:center;flex-shrink:0}
    .lb-info{flex:1;min-width:0}
    .lb-name{font-weight:600;font-size:0.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .lb-sub{font-size:0.7rem;color:rgba(255,255,255,0.4);margin-top:1px}
    .lb-time{font-weight:700;font-size:0.9rem;color:#07CA6B;text-align:right;white-space:nowrap}

    /* CHAT */
    .chat-msgs{height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px 0;margin-top:10px}
    .chat-msgs::-webkit-scrollbar{width:4px}
    .chat-msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px}
    .msg{display:flex;gap:8px;align-items:flex-start;animation:fi 0.2s ease}
    .msg.mine{flex-direction:row-reverse}
    @keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    .msg-av{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:700;flex-shrink:0;overflow:hidden}
    .msg-av img{width:100%;height:100%;object-fit:cover}
    .msg-body{max-width:78%}
    .msg-name{font-size:0.65rem;color:rgba(255,255,255,0.4);margin-bottom:2px}
    .msg.mine .msg-name{text-align:right}
    .msg-bubble{padding:7px 12px;border-radius:12px;font-size:0.85rem;line-height:1.4;background:#252535;word-break:break-word}
    .msg.mine .msg-bubble{background:rgba(99,102,241,0.35)}
    .msg-time{font-size:0.6rem;color:rgba(255,255,255,0.25);margin-top:2px}
    .msg.mine .msg-time{text-align:right}
    .chat-row{display:flex;gap:8px;margin-top:10px;align-items:center}
    .chat-in{flex:1;padding:9px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:#1e1e2e;color:#fff;font-size:0.85rem;font-family:inherit;outline:none}
    .chat-in:focus{border-color:rgba(99,102,241,0.5)}
    .chat-in::placeholder{color:rgba(255,255,255,0.3)}
    .chat-send{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;transition:transform 0.15s}
    .chat-send:hover{transform:scale(1.05)}
    .chat-send:disabled{opacity:0.4;cursor:default;transform:none}


    /* ACHIEVEMENTS */
    .achv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
    .achv-card{padding:14px;border-radius:12px;background:#1e1e2e;border:1px solid rgba(255,255,255,0.06);position:relative;transition:all 0.2s}
    .achv-card.locked{opacity:0.35;filter:grayscale(0.8)}
    .achv-card.unlocked.legendary{background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.35)}
    .achv-card.unlocked.epic{background:rgba(167,139,250,0.08);border-color:rgba(167,139,250,0.35)}
    .achv-card.unlocked.common{background:rgba(7,202,107,0.06);border-color:rgba(7,202,107,0.25)}
    .achv-icon{font-size:1.6rem;margin-bottom:6px}
    .achv-name{font-size:0.82rem;font-weight:700;margin-bottom:3px}
    .achv-desc{font-size:0.7rem;color:rgba(255,255,255,0.45);line-height:1.4}
    .achv-rarity{display:inline-block;margin-top:6px;font-size:0.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:4px}
    .rarity-common{background:rgba(7,202,107,0.15);color:#07CA6B}
    .rarity-epic{background:rgba(167,139,250,0.15);color:#a78bfa}
    .rarity-legendary{background:rgba(251,191,36,0.15);color:#fbbf24}
    .achv-check{position:absolute;top:10px;right:10px;font-size:0.75rem;color:#07CA6B}

    /* TOAST */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1e2e;border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:12px 20px;font-size:0.85rem;font-weight:600;z-index:999;transition:transform 0.4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw}
    #toast.show{transform:translateX(-50%) translateY(0)}

    /* LOGIN */
    #loginScreen{width:100%;max-width:380px;margin:60px auto 0;background:#16161f;border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:36px;text-align:center;display:none}
    .login-icon{font-size:2.5rem;margin-bottom:14px}
    .login-title{font-size:1.15rem;font-weight:700;margin-bottom:6px}
    .login-desc{font-size:0.82rem;color:rgba(255,255,255,0.45);margin-bottom:24px;line-height:1.6}
    .btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:12px 20px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);color:#fff;font-size:0.9rem;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:inherit}
    .btn-google:hover{background:rgba(255,255,255,0.14);transform:translateY(-1px)}

    #loadingScreen{color:rgba(255,255,255,0.4);font-size:0.9rem;text-align:center;padding:80px 20px}
    .loader-txt{color:rgba(255,255,255,0.3);text-align:center;padding:20px;font-size:0.82rem}
  </style>
</head>
<body>

<div id="loadingScreen">Загрузка…</div>

<div id="loginScreen">
  <div class="login-icon">📊</div>
  <div class="login-title">Статусы группы</div>
  <p class="login-desc">Войдите через Google, чтобы присоединиться к группе</p>
  <button class="btn-google" onclick="loginWithGoogle()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/>
      <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
      <path fill="#4CAF50" d="M24 44c5.2 0 9.8-1.9 13.3-5.1l-6.2-5.2C29.2 35.3 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
      <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.3 4.1-4.2 5.5l6.2 5.2C37 36.9 44 31 44 24c0-1.3-.1-2.7-.4-3.9z"/>
    </svg>
    Войти через Google
  </button>
</div>

<div id="appScreen" style="display:none">
  <div class="header">
    <div class="header-label">Realtime Monitor</div>
    <h1>Статусы <span>группы</span></h1>
  </div>

  <div class="wrap">

    <!-- SESSION CARD -->
    <div class="card">
      <div class="sess-label">Сессия учёбы</div>
      <div class="sess-name" id="sessName">…</div>
      <div class="sess-timer">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#07CA6B" stroke-width="2.2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2"/><path d="M9 2h6M12 2v3"/></svg>
        <span id="sessTimerDisplay">0 сек.</span>
      </div>
      <div class="sess-status-txt" id="sessStatusTxt" style="color:#f59e0b">● ПЕРЕРЫВ</div>
      <div class="sess-btns">
        <button class="sbtn sbtn-start" id="btnStartPause" onclick="sessToggle()">▶ Начать</button>
        <button class="sbtn sbtn-end"   onclick="sessEnd()">■ Завершить</button>
        <button class="sbtn sbtn-logout" onclick="logout()">Выход</button>
      </div>
    </div>

    <!-- PROFILE CARD -->
    <div class="card">
      <div class="sess-label">Ваш профиль</div>
      <div class="prof-row">
        <div class="av-wrap">
          <div class="avatar" id="myAvatar">?</div>
          <span class="online-dot" id="myOnlineDot"></span>
        </div>
        <div class="prof-info">
          <div class="prof-name" id="myUsername">…</div>
          <div class="prof-online" id="myOnlineTxt">● В сети</div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-cell">
          <div class="stat-val" id="statStudy">0с</div>
          <div class="stat-lbl">Учёба</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val" id="statSessions">0</div>
          <div class="stat-lbl">Сессий</div>
        </div>
        <div class="stat-cell">
          <div class="stat-val" id="statMsgs">0</div>
          <div class="stat-lbl">Сообщ.</div>
        </div>
      </div>

      <!-- STATUS PICKER -->
      <div class="status-grid" id="statusPicker">
        <button class="spick" style="--c:#07CA6B" data-status="studying" onclick="setStatus('studying')">
          <span class="spick-dot"></span>📚 Учусь
        </button>
        <button class="spick" style="--c:#E89558" data-status="away" onclick="setStatus('away')">
          <span class="spick-dot"></span>🚶 Отошёл
        </button>
        <button class="spick" style="--c:#EA2143" data-status="dnd" onclick="setStatus('dnd')">
          <span class="spick-dot"></span>🔴 Занят
        </button>
        <button class="spick" style="--c:#6b7280" data-status="dnd2" onclick="setStatus('dnd2')">
          <span class="spick-dot"></span>🔕 Не беспокоить
        </button>
      </div>

      <!-- GROUP SUMMARY -->
      <div class="group-summary">
        <div class="gs-cell gs-studying">
          <div class="gs-val" id="gsStudying">0</div>
          <div class="gs-lbl">Учатся</div>
        </div>
        <div class="gs-cell gs-break">
          <div class="gs-val" id="gsBreak">0</div>
          <div class="gs-lbl">Перерыв</div>
        </div>
        <div class="gs-cell gs-offline">
          <div class="gs-val" id="gsOffline">0</div>
          <div class="gs-lbl">Офлайн</div>
        </div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs" style="grid-template-columns:1fr 1fr 1fr">
      <button class="tab active" id="tabMembers" onclick="switchTab('members')">👥 Участники</button>
      <button class="tab" id="tabRating"  onclick="switchTab('rating')">🏆 Рейтинг</button>
      <button class="tab" id="tabAchv"    onclick="switchTab('achv')">🎖 Достижения</button>
    </div>

    <div id="panelMembers" class="panel active">
      <ul class="user-list" id="userList"><li class="loader-txt">Загрузка…</li></ul>
    </div>
    <div id="panelRating" class="panel">
      <div id="lbList"><div class="loader-txt">Загрузка…</div></div>
    </div>
    <div id="panelAchv" class="panel">
      <div class="achv-grid" id="achvGrid"><div class="loader-txt" style="grid-column:span 2">Загрузка…</div></div>
    </div>

    <!-- CHAT -->
    <div class="card" style="margin-top:14px;padding:18px 20px">
      <div class="sess-label" style="margin-bottom:0">💬 Общий чат</div>
      <div class="chat-msgs" id="chatMsgs"><div class="loader-txt">Загрузка…</div></div>
      <div class="chat-row">
        <input class="chat-in" id="chatIn" placeholder="Сообщение…" maxlength="500"
          onkeydown="if(event.key==='Enter')sendMsg()"/>
        <button class="chat-send" onclick="sendMsg()" id="chatBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

  </div>
</div>

<div id="toast">🎉</div>

<script>
const SUPABASE_URL = "https://vwjuqdgumxhjbkowepfx.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3anVxZGd1bXhoamJrb3dlcGZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzEyMjQsImV4cCI6MjA5MTIwNzIyNH0.DO7WAaPhGIGr0AtwOuuV0lketGjyyOqWSZw5dzWf59k";
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let studySeconds = 0;
let sessSeconds = 0;
let studyInterval = null;
let sessInterval = null;
let currentStatus = "offline";
let sessionRunning = false;   // true = таймер идёт (учёба)
let mySessions = 0;
let myMsgCount = 0;
let allProfiles = [];
let chatMessages = [];

// ── HELPERS ────────────────────────────────────────────────
function initials(n){ if(!n)return"?"; return n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2); }
function isOnline(s){ return s && s!=="offline"; }
function fmtSecs(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0) return h+"ч "+m+"м "+sec+"с";
  if(m>0) return m+"м "+sec+"с";
  return sec+" сек.";
}
function fmtSecsShort(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
  if(h>0) return h+"ч "+m+"м";
  if(m>0) return m+"м";
  return s+"с";
}
function timeAgo(iso){
  const diff=Math.floor((Date.now()-new Date(iso))/1000);
  if(diff<60) return "только что";
  if(diff<3600) return Math.floor(diff/60)+" мин назад";
  return new Date(iso).toLocaleTimeString("ru",{hour:"2-digit",minute:"2-digit"});
}
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

const STATUS_CFG = {
  studying:{ label:"Учусь",           badge:"badge-studying", color:"#07CA6B" },
  away:    { label:"Отошёл",          badge:"badge-away",     color:"#E89558" },
  break:   { label:"Перерыв",         badge:"badge-break",    color:"#fbbf24" },
  dnd:     { label:"Занят",           badge:"badge-dnd",      color:"#EA2143" },
  dnd2:    { label:"Не беспокоить",   badge:"badge-dnd2",     color:"#6b7280" },
  offline: { label:"Не в сети",       badge:"badge-offline",  color:"#6b7280" },
};

// ── TOAST ──────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3500);
}

// ── TABS ───────────────────────────────────────────────────
function switchTab(tab){
  ["members","rating","achv"].forEach(t=>{
    document.getElementById("panel"+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle("active",t===tab);
    document.getElementById("tab"+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle("active",t===tab);
  });
  if(tab==="rating") renderLeaderboard();
  if(tab==="achv")   renderAchievements();
}

// ── ACHIEVEMENTS ───────────────────────────────────────────

  { key:"first_session",  icon:"🌱", name:"Первый шаг",      desc:"Провёл первую учебную сессию",      rarity:"common",    check:(d)=>d.sessions>=1 },
  { key:"chat_active",    icon:"💬", name:"Активист",         desc:"Написал 20 сообщений в чате",        rarity:"common",    check:(d)=>d.msgs>=20 },
  { key:"hour_study",     icon:"⏰", name:"Час учёбы",        desc:"Набрал 1 час суммарно",              rarity:"common",    check:(d)=>d.totalSecs>=3600 },
  { key:"ten_sessions",   icon:"📅", name:"Регулярность",     desc:"Провёл 10 учебных сессий",           rarity:"epic",      check:(d)=>d.sessions>=10 },
  { key:"dedication",     icon:"💪", name:"Дедикация",        desc:"Набрал 10 часов суммарно",           rarity:"epic",      check:(d)=>d.totalSecs>=36000 },
  { key:"chat_legend",    icon:"🎙", name:"Душа компании",    desc:"Написал 50 сообщений в чате",        rarity:"epic",      check:(d)=>d.msgs>=50 },
  { key:"workaholic",     icon:"🔥", name:"Трудоголик",       desc:"Набрал 6 часов учёбы суммарно",      rarity:"epic",      check:(d)=>d.totalSecs>=21600 },
  { key:"legend_20h",     icon:"⚡", name:"Легенда",          desc:"Набрал 20 часов суммарно",           rarity:"legendary", check:(d)=>d.totalSecs>=72000 },
  { key:"podium",         icon:"🏆", name:"Пьедестал",        desc:"Вошёл в топ-3 рейтинга",            rarity:"legendary", check:(d)=>d.topThree },
];

function getCheckData(){
  const sorted=[...allProfiles].sort((a,b)=>(b.study_seconds||0)-(a.study_seconds||0));
  const topThree=sorted.slice(0,3).some(p=>currentUser&&p.id===currentUser.id);
  return{
    sessions: mySessions,
    totalSecs: studySeconds,
    msgs: myMsgCount,
    topThree,
  };
}

function renderAchievements(){
  const grid=document.getElementById("achvGrid");
  const d=getCheckData();
  const rarityLabel={common:"Обычное",epic:"Эпическое",legendary:"Легендарное"};
  grid.innerHTML=ACHIEVEMENTS.map(a=>{
    const unlocked=a.check(d);
    return `<div class="achv-card ${unlocked?"unlocked "+a.rarity:"locked"}">
      ${unlocked?'<div class="achv-check">✓</div>':""}
      <div class="achv-icon">${a.icon}</div>
      <div class="achv-name">${a.name}</div>
      <div class="achv-desc">${a.desc}</div>
      <span class="achv-rarity rarity-${a.rarity}">${rarityLabel[a.rarity]}</span>
    </div>`;
  }).join("");
}

// ── SESSION TIMER (display only) ───────────────────────────
function startSessTimer(){
  if(sessInterval) return;
  sessInterval = setInterval(()=>{
    sessSeconds++;
    document.getElementById("sessTimerDisplay").textContent = fmtSecs(sessSeconds);
  },1000);
}
function stopSessTimer(){
  if(sessInterval){ clearInterval(sessInterval); sessInterval=null; }
}

// ── STUDY TIMER (persisted) ────────────────────────────────
function startStudyTimer(){
  if(studyInterval) return;
  studyInterval = setInterval(async()=>{
    studySeconds++;
    document.getElementById("statStudy").textContent = fmtSecsShort(studySeconds);
    if(studySeconds % 30 === 0 && currentUser){
      await db.from("profiles").update({study_seconds:studySeconds}).eq("id",currentUser.id);
    }
  },1000);
}
function stopStudyTimer(){
  if(studyInterval){ clearInterval(studyInterval); studyInterval=null; }
  if(currentUser && studySeconds>0){
    db.from("profiles").update({study_seconds:studySeconds}).eq("id",currentUser.id);
  }
}

// ── SESSION TOGGLE (Начать / Перерыв) ─────────────────────
async function sessToggle(){
  if(!sessionRunning){
    // → НАЧАТЬ / ПРОДОЛЖИТЬ
    sessionRunning = true;
    if(mySessions === 0 || !studyInterval){ mySessions++; document.getElementById("statSessions").textContent = mySessions; }
    await setStatus("studying");
    document.getElementById("sessStatusTxt").textContent = "● ИДЁТ УЧЁБА";
    document.getElementById("sessStatusTxt").style.color = "#07CA6B";
    document.getElementById("btnStartPause").textContent = "⏸ Перерыв";
    startSessTimer();
    startStudyTimer();
  } else {
    // → ПЕРЕРЫВ
    sessionRunning = false;
    await setStatus("away");
    document.getElementById("sessStatusTxt").textContent = "● ПЕРЕРЫВ";
    document.getElementById("sessStatusTxt").style.color = "#f59e0b";
    document.getElementById("btnStartPause").textContent = "▶ Продолжить";
    stopSessTimer();
    stopStudyTimer();
  }
}

// ── SESSION END ────────────────────────────────────────────
async function sessEnd(){
  sessionRunning = false;
  stopSessTimer();
  stopStudyTimer();
  await setStatus("offline");
  document.getElementById("sessStatusTxt").textContent = "● ЗАВЕРШЕНО";
  document.getElementById("sessStatusTxt").style.color = "rgba(255,255,255,0.4)";
  document.getElementById("btnStartPause").textContent = "▶ Начать";
  sessSeconds = 0;
  document.getElementById("sessTimerDisplay").textContent = "0 сек.";
  showToast("✅ Сессия завершена! "+fmtSecsShort(studySeconds)+" учёбы");
}

// ── STATUS ─────────────────────────────────────────────────
async function setStatus(status){
  if(!currentUser) return;
  const {error} = await db.from("profiles").update({status}).eq("id",currentUser.id);
  if(error) console.error("setStatus error:",error);
}

// ── AUTH ───────────────────────────────────────────────────
async function loginWithGoogle(){
  await db.auth.signInWithOAuth({provider:"google",options:{redirectTo:window.location.href}});
}

async function logout(){
  stopStudyTimer();
  stopSessTimer();
  if(currentUser){
    await db.from("profiles").update({status:"offline",study_seconds:studySeconds}).eq("id",currentUser.id);
  }
  await db.auth.signOut();
}

async function ensureProfile(user){
  try{
    const meta = user.user_metadata||{};
    const username = meta.full_name||meta.name||user.email?.split("@")[0]||"User";
    const avatar_url = meta.avatar_url||meta.picture||null;

    const {data:ex} = await db.from("profiles").select("id,study_seconds,session_count").eq("id",user.id).single();
    if(ex){
      studySeconds = ex.study_seconds||0;
      mySessions   = ex.session_count||0;
      await db.from("profiles").update({username,avatar_url,status:"studying"}).eq("id",user.id);
    } else {
      const p = {id:user.id,username,status:"studying",study_seconds:0,session_count:0};
      if(avatar_url) p.avatar_url = avatar_url;
      await db.from("profiles").insert(p);
    }

    document.getElementById("statStudy").textContent    = fmtSecsShort(studySeconds);
    document.getElementById("statSessions").textContent = mySessions;
    document.getElementById("sessName").textContent     = username;

    // msg count (graceful)
    try{
      const {count} = await db.from("messages").select("id",{count:"exact",head:true}).eq("user_id",user.id);
      myMsgCount = count||0;
      document.getElementById("statMsgs").textContent = myMsgCount;
    }catch(e){}

  }catch(e){ console.error("ensureProfile:",e); }
}

// ── RENDER USERS ───────────────────────────────────────────
function renderList(profiles){
  allProfiles = profiles;
  const ul = document.getElementById("userList");

  const sorted = [...profiles].sort((a,b)=>{
    const ao=isOnline(a.status)?0:1, bo=isOnline(b.status)?0:1;
    return ao-bo;
  });

  let studying=0, brk=0, offline=0;
  profiles.forEach(p=>{
    if(p.status==="studying") studying++;
    else if(p.status==="away"||p.status==="break"||p.status==="dnd"||p.status==="dnd2") brk++;
    else offline++;
  });
  document.getElementById("gsStudying").textContent = studying;
  document.getElementById("gsBreak").textContent    = brk;
  document.getElementById("gsOffline").textContent  = offline;

  if(!sorted.length){ ul.innerHTML='<li class="loader-txt">Нет пользователей</li>'; return; }

  ul.innerHTML = sorted.map(p=>{
    const av  = p.avatar_url ? `<img src="${p.avatar_url}" alt="">` : initials(p.username);
    const cfg = STATUS_CFG[p.status]||STATUS_CFG.offline;
    const online = isOnline(p.status);
    const study  = p.study_seconds>0 ? `⏱ ${fmtSecsShort(p.study_seconds)} в учёбе` : "";
    return `<li class="user-item">
      <div class="av-sm-wrap">
        <div class="av-sm">${av}</div>
        <span class="online-dot${online?" on":""}"></span>
      </div>
      <div class="item-info">
        <div class="item-name">${p.username||"?"}</div>
        ${study?`<div class="item-sub">${study}</div>`:""}
      </div>
      <span class="status-badge ${cfg.badge}">
        <span class="sbdot"></span>${cfg.label}
      </span>
    </li>`;
  }).join("");
}

// ── RENDER MY CARD ─────────────────────────────────────────
function renderMyCard(profile){
  const el = document.getElementById("myAvatar");
  el.innerHTML = profile.avatar_url ? `<img src="${profile.avatar_url}" alt="">` : initials(profile.username);
  document.getElementById("myUsername").textContent = profile.username||"?";

  const s = profile.status||"offline";
  const online = isOnline(s);
  const onDot = document.getElementById("myOnlineDot");
  const onTxt = document.getElementById("myOnlineTxt");

  if(online){
    onDot.classList.add("on");
    onTxt.textContent = "● В сети";
    onTxt.style.color = "#07CA6B";
  } else {
    onDot.classList.remove("on");
    onTxt.textContent = "● Не в сети";
    onTxt.style.color = "rgba(255,255,255,0.35)";
  }

  document.querySelectorAll(".spick").forEach(b=>{
    b.classList.toggle("active", b.dataset.status===s);
  });

  currentStatus = s;
}

// ── LOAD ALL ───────────────────────────────────────────────
async function loadAll(){
  try{
    const {data,error} = await db.from("profiles").select("*");
    if(error){ console.error("loadAll:",error); return; }
    renderList(data||[]);
    if(currentUser){
      const me = (data||[]).find(p=>p.id===currentUser.id);
      if(me) renderMyCard(me);
    }
  }catch(e){ console.error("loadAll exception:",e); }
}

// ── LEADERBOARD ────────────────────────────────────────────
function renderLeaderboard(){
  const sorted = [...allProfiles].sort((a,b)=>(b.study_seconds||0)-(a.study_seconds||0));
  const medals = ["🥇","🥈","🥉"];
  const lb = document.getElementById("lbList");
  if(!sorted.length){ lb.innerHTML='<div class="loader-txt">Нет данных</div>'; return; }
  lb.innerHTML = sorted.map((p,i)=>{
    const av   = p.avatar_url ? `<img src="${p.avatar_url}" alt="">` : initials(p.username);
    const mine = currentUser && p.id===currentUser.id;
    return `<div class="lb-item" style="${mine?"border-color:rgba(7,202,107,0.35);background:rgba(7,202,107,0.05)":""}">
      <div class="lb-rank">${medals[i]||"#"+(i+1)}</div>
      <div class="av-sm" style="border-radius:8px">${av}</div>
      <div class="lb-info">
        <div class="lb-name">${p.username||"?"}</div>
        <div class="lb-sub">${p.session_count||0} сессий</div>
      </div>
      <div class="lb-time">${fmtSecsShort(p.study_seconds||0)}</div>
    </div>`;
  }).join("");
}

// ── CHAT ───────────────────────────────────────────────────
async function loadMsgs(){
  try{
    const {data,error} = await db.from("messages").select("*").order("created_at",{ascending:true}).limit(100);
    if(error){ console.error("loadMsgs:",error); document.getElementById("chatMsgs").innerHTML='<div class="loader-txt">Чат недоступен</div>'; return; }
    chatMessages = data||[];
    renderMsgs();
  }catch(e){ console.error("loadMsgs exception:",e); }
}

function renderMsgs(){
  const box = document.getElementById("chatMsgs");
  if(!chatMessages.length){ box.innerHTML='<div class="loader-txt">Нет сообщений — напишите первым!</div>'; return; }
  box.innerHTML = chatMessages.map(m=>{
    const mine = currentUser && m.user_id===currentUser.id;
    const av   = m.avatar_url ? `<img src="${m.avatar_url}" alt="">` : initials(m.username);
    return `<div class="msg${mine?" mine":""}">
      <div class="msg-av">${av}</div>
      <div class="msg-body">
        <div class="msg-name">${m.username||"?"}</div>
        <div class="msg-bubble">${esc(m.text)}</div>
        <div class="msg-time">${timeAgo(m.created_at)}</div>
      </div>
    </div>`;
  }).join("");
  box.scrollTop = box.scrollHeight;
}

async function sendMsg(){
  if(!currentUser) return;
  const inp  = document.getElementById("chatIn");
  const text = inp.value.trim();
  if(!text) return;
  const btn = document.getElementById("chatBtn");
  btn.disabled = true;
  inp.value = "";
  const meta = currentUser.user_metadata||{};
  const {error} = await db.from("messages").insert({
    user_id:    currentUser.id,
    username:   meta.full_name||meta.name||currentUser.email?.split("@")[0]||"User",
    avatar_url: meta.avatar_url||meta.picture||null,
    text
  });
  if(error){ console.error("sendMsg:",error); inp.value=text; }
  else{ myMsgCount++; document.getElementById("statMsgs").textContent=myMsgCount; }
  btn.disabled = false;
  inp.focus();
}

// ── SCREENS ────────────────────────────────────────────────
function showEl(id){
  ["loadingScreen","loginScreen","appScreen"].forEach(i=>{
    document.getElementById(i).style.display = i===id ? "block" : "none";
  });
}

// ── REALTIME ───────────────────────────────────────────────
db.channel("profiles-rt")
  .on("postgres_changes",{event:"*",schema:"public",table:"profiles"},()=>loadAll())
  .subscribe();

db.channel("messages-rt")
  .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},payload=>{
    chatMessages.push(payload.new);
    renderMsgs();
  })
  .subscribe();

// ── INIT ───────────────────────────────────────────────────
db.auth.onAuthStateChange(async(event,session)=>{
  if(session?.user){
    currentUser = session.user;
    // показываем данные из Google немедленно
    const meta = currentUser.user_metadata||{};
    renderMyCard({
      username:   meta.full_name||meta.name||currentUser.email?.split("@")[0]||"User",
      avatar_url: meta.avatar_url||meta.picture||null,
      status:     "studying"
    });
    document.getElementById("sessName").textContent = meta.full_name||meta.name||"…";
    showEl("appScreen");

    // фоновая инициализация — не блокирует UI
    ensureProfile(currentUser)
      .then(()=> Promise.all([loadAll(), loadMsgs()]))
      .then(()=>{ sessToggle(); })   // автостарт сессии
      .catch(console.error);
  } else {
    currentUser = null;
    stopStudyTimer();
    stopSessTimer();
    showEl("loginScreen");
  }
});

showEl("loadingScreen");
</script>
