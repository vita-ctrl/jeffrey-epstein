<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BaaS — Firebase</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --surface2: #1c1c20;
      --border: #2a2a30;
      --accent: #5b6ef5;
      --text: #e8e8f0;
      --muted: #6b6b7a;
      --danger: #f87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(91,110,245,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,110,245,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    .wrapper { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; }
    .header-dot {
      width: 10px; height: 10px; background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 12px var(--accent); animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.5; transform:scale(.8); }
    }
    .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -.5px; flex: 1; }
    .header h1 span { color: var(--accent); }

    /* Auth bar */
    .auth-bar { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); object-fit: cover; }
    .user-name { font-size: 13px; font-weight: 600; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Buttons */
    .btn { padding: 9px 16px; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; transition: all .2s; white-space: nowrap; }
    .btn-google { background: var(--accent); color: #fff; display: flex; align-items: center; gap: 8px; }
    .btn-google:hover { background: #4a5de8; transform: translateY(-1px); }
    .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 12px; padding: 7px 12px; }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }
    .btn-publish { background: var(--accent); color: #fff; width: 100%; padding: 11px 18px; font-size: 14px; }
    .btn-publish:hover { background: #4a5de8; transform: translateY(-1px); }
    .btn-publish:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .g-icon { width: 16px; height: 16px; flex-shrink: 0; }

    /* Panel */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .panel-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }

    /* Inputs */
    .field-row { display: flex; gap: 10px; margin-bottom: 10px; }
    input[type="text"] {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px;
      padding: 11px 14px; border-radius: 8px; outline: none; transition: border-color .2s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--accent); }

    /* Upload area */
    .upload-area {
      position: relative; border: 2px dashed var(--border); border-radius: 10px;
      padding: 18px; margin-bottom: 10px; cursor: pointer;
      transition: border-color .2s, background .2s; text-align: center;
    }
    .upload-area:hover { border-color: var(--accent); background: rgba(91,110,245,.04); }
    .upload-area.has-image { border-style: solid; border-color: var(--accent); padding: 8px; }
    .upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; height: 100%; padding: 0; border: none; background: none;
    }
    .upload-placeholder { display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; }
    .upload-placeholder-icon { font-size: 22px; }
    .upload-placeholder-text { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
    .upload-placeholder-hint { font-size: 10px; color: var(--muted); opacity: .6; }
    #imagePreview { display: none; width: 100%; max-height: 200px; object-fit: contain; border-radius: 6px; }
    .remove-image-btn {
      display: none; position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,.65); border: none; color: #fff;
      width: 24px; height: 24px; border-radius: 50%;
      cursor: pointer; font-size: 12px; align-items: center; justify-content: center; z-index: 2;
    }

    /* Search */
    .search-wrap { position: relative; margin-bottom: 20px; }
    .search-wrap input[type="text"] { width: 100%; padding-left: 38px; }
    .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }

    /* Guest banner */
    .guest-banner {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--accent); border-radius: 12px;
      padding: 16px 20px; margin-bottom: 20px;
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted);
    }
    .guest-banner span { color: var(--accent); }

    /* Feed */
    #feed { display: flex; flex-direction: column; gap: 10px; }
    .post {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      animation: fadeIn .3s ease; transition: border-color .2s;
    }
    .post:hover { border-color: #3a3a45; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .post-body { padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .post-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); flex-shrink: 0; }
    .post-info { flex: 1; min-width: 0; }
    .post-name { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-email { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-text { font-size: 13px; color: var(--text); margin-top: 4px; word-break: break-word; }
    .post-time { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }

    .post-image-wrap { padding: 0 18px 14px; }
    .post-image { width: 100%; max-height: 320px; object-fit: cover; border-radius: 8px; display: block; cursor: zoom-in; border: 1px solid var(--border); }

    .post-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .like-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: all .2s; }
    .like-btn:hover { border-color: var(--accent); color: var(--accent); }
    .delete-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .delete-btn:hover { border-color: var(--danger); color: var(--danger); background: rgba(248,113,113,.08); }

    /* Lightbox */
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 200; align-items: center; justify-content: center; cursor: zoom-out; }
    #lightbox.open { display: flex; }
    #lightboxImg { max-width: 90vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }

    .empty { text-align: center; padding: 40px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      font-size: 13px; font-family: 'IBM Plex Mono', monospace;
      padding: 10px 20px; border-radius: 30px; transition: transform .3s ease; z-index: 100;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="header">
    <div class="header-dot"></div>
    <h1>Cloud <span>Feed</span></h1>

    <div class="auth-bar" id="loginArea">
      <button class="btn btn-google" id="loginBtn">
        <svg class="g-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Войти
      </button>
    </div>

    <div class="auth-bar" id="userArea" style="display:none;">
      <img id="userPhoto" class="user-avatar" src="" alt="avatar">
      <span class="user-name" id="userName"></span>
      <button class="btn btn-logout" id="logoutBtn">Выйти</button>
    </div>
  </div>

  <div class="panel" id="messageForm" style="display:none;">
    <div class="panel-label">// новая запись</div>
    <div class="field-row">
      <input type="text" id="contentInput" placeholder="Что у вас нового?">
    </div>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*">
      <button class="remove-image-btn" id="removeImageBtn" type="button">✕</button>
      <img id="imagePreview" alt="preview">
      <div class="upload-placeholder" id="uploadPlaceholder">
        <span class="upload-placeholder-icon">🖼</span>
        <span class="upload-placeholder-text">Прикрепить изображение</span>
        <span class="upload-placeholder-hint">JPG, PNG, GIF · до 512 КБ</span>
      </div>
    </div>

    <button class="btn btn-publish" id="mainBtn">Опубликовать в облако</button>
  </div>

  <div class="guest-banner" id="guestBanner">
    // <span>только чтение</span> — войдите через Google, чтобы публиковать записи
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Поиск по имени или email...">
  </div>

  <div id="feed"></div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="full">
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, query, orderBy,
    onSnapshot, serverTimestamp, updateDoc, deleteDoc, doc, increment
  } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup,
    signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBK0Bq-hvxwqrYeX-ThgbatMsjnFXxsld8",
    authDomain: "jeffrey-epstein-ed456.firebaseapp.com",
    projectId: "jeffrey-epstein-ed456",
    storageBucket: "jeffrey-epstein-ed456.firebasestorage.app",
    messagingSenderId: "312094362251",
    appId: "1:312094362251:web:c44b2d36dcbc7c3adb228e"
  };

  const app      = initializeApp(firebaseConfig);
  const db       = getFirestore(app);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  // ── Toast ──────────────────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Auth ───────────────────────────────────────────────────────────────────
  document.getElementById('loginBtn').onclick  = () => signInWithPopup(auth, provider);
  document.getElementById('logoutBtn').onclick = () => signOut(auth);

  onAuthStateChanged(auth, user => {
    const show = (id, v) => document.getElementById(id).style.display = v;
    if (user) {
      show('loginArea',   'none');
      show('userArea',    'flex');
      show('messageForm', 'block');
      show('guestBanner', 'none');
      document.getElementById('userPhoto').src      = user.photoURL || '';
      document.getElementById('userName').innerText = user.displayName || user.email;
    } else {
      show('loginArea',   'flex');
      show('userArea',    'none');
      show('messageForm', 'none');
      show('guestBanner', 'block');
    }
  });

  // ── Image picker ───────────────────────────────────────────────────────────
  const MAX_BYTES = 512 * 1024; // 512 КБ
  let selectedBase64 = null;

  const fileInput    = document.getElementById('fileInput');
  const imagePreview = document.getElementById('imagePreview');
  const uploadArea   = document.getElementById('uploadArea');
  const placeholder  = document.getElementById('uploadPlaceholder');
  const removeBtn    = document.getElementById('removeImageBtn');

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    if (file.size > MAX_BYTES) {
      showToast('✗ Файл слишком большой (макс. 512 КБ)');
      fileInput.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      selectedBase64             = e.target.result; // "data:image/...;base64,..."
      imagePreview.src           = selectedBase64;
      imagePreview.style.display = 'block';
      placeholder.style.display  = 'none';
      removeBtn.style.display    = 'flex';
      uploadArea.classList.add('has-image');
    };
    reader.readAsDataURL(file);
  });

  removeBtn.addEventListener('click', e => {
    e.stopPropagation();
    clearImage();
  });

  function clearImage() {
    selectedBase64             = null;
    fileInput.value            = '';
    imagePreview.style.display = 'none';
    imagePreview.src           = '';
    placeholder.style.display  = 'flex';
    removeBtn.style.display    = 'none';
    uploadArea.classList.remove('has-image');
  }

  // ── Публикация ─────────────────────────────────────────────────────────────
  document.getElementById('mainBtn').onclick = async () => {
    const btn     = document.getElementById('mainBtn');
    const content = document.getElementById('contentInput').value.trim();
    const user    = auth.currentUser;

    if (!content && !selectedBase64) return showToast('✗ Добавьте текст или картинку');
    if (!user) return showToast('✗ Сначала войдите в аккаунт');

    btn.disabled = true;
    try {
      const payload = {
        name:      user.displayName,
        email:     user.email,
        photo:     user.photoURL,
        text:      content,
        likes:     0,
        timestamp: serverTimestamp()
      };
      // сохраняем base64-строку прямо в документ Firestore
      if (selectedBase64) payload.image = selectedBase64;

      await addDoc(collection(db, "requests"), payload);
      document.getElementById('contentInput').value = '';
      clearImage();
      showToast('✓ Опубликовано');
    } catch (e) {
      showToast('✗ Ошибка: ' + e.message);
      console.error('Write error:', e);
    }
    btn.disabled = false;
  };

  // ── Лайк ──────────────────────────────────────────────────────────────────
  window.processLike = async (id) => {
    if (!auth.currentUser) return showToast('✗ Войдите, чтобы лайкать');
    try {
      await updateDoc(doc(db, "requests", id), { likes: increment(1) });
    } catch (e) {
      showToast('✗ ' + e.message);
    }
  };

  // ── Удаление ──────────────────────────────────────────────────────────────
  window.deletePost = async (id) => {
    try {
      await deleteDoc(doc(db, "requests", id));
      showToast('✓ Запись удалена');
    } catch (e) {
      showToast('✗ Удаление запрещено правилами сервера');
      console.error('Delete blocked:', e.message);
    }
  };

  // ── Lightbox ───────────────────────────────────────────────────────────────
  window.openLightbox = (src) => {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('open');
  };
  window.closeLightbox = () => {
    document.getElementById('lightbox').classList.remove('open');
  };

  // ── Поиск ─────────────────────────────────────────────────────────────────
  let allPosts = [];

  document.getElementById('searchInput').addEventListener('input', () => {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    renderFeed(q ? allPosts.filter(p =>
      p.name.toLowerCase().includes(q) || p.email.toLowerCase().includes(q)
    ) : allPosts);
  });

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderFeed(posts) {
    const feed = document.getElementById('feed');
    if (!posts.length) {
      feed.innerHTML = `<div class="empty">// нет результатов</div>`;
      return;
    }
    feed.innerHTML = posts.map(p => `
      <div class="post">
        <div class="post-body">
          <img class="post-avatar"
               src="${escapeHtml(p.photo || 'https://via.placeholder.com/38')}"
               alt="avatar"
               onerror="this.src='https://via.placeholder.com/38'">
          <div class="post-info">
            <div class="post-name">${escapeHtml(p.name)}</div>
            <div class="post-email">${escapeHtml(p.email)}</div>
            ${p.text ? `<div class="post-text">${escapeHtml(p.text)}</div>` : ''}
            <div class="post-time">${p.time}</div>
          </div>
          <div class="post-actions">
            <button class="like-btn" onclick="processLike('${p.id}')">👍 ${p.likes}</button>
            <button class="delete-btn" onclick="deletePost('${p.id}')" title="Удалить">✕</button>
          </div>
        </div>
        ${p.image ? `
        <div class="post-image-wrap">
          <img class="post-image"
               src="${p.image}"
               alt="attachment"
               onclick="openLightbox(this.src)">
        </div>` : ''}
      </div>`).join('');
  }

  // ── Realtime ───────────────────────────────────────────────────────────────
  const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
  onSnapshot(q, snapshot => {
    allPosts = snapshot.docs.map(d => ({
      id:    d.id,
      name:  d.data().name  || '—',
      email: d.data().email || '—',
      photo: d.data().photo || '',
      text:  d.data().text  || '',
      image: d.data().image || '',
      likes: d.data().likes || 0,
      time:  d.data().timestamp?.toDate().toLocaleTimeString('ru') || '...'
    }));
    const sq = document.getElementById('searchInput').value.toLowerCase().trim();
    renderFeed(sq ? allPosts.filter(p =>
      p.name.toLowerCase().includes(sq) || p.email.toLowerCase().includes(sq)
    ) : allPosts);
  });

  window.db   = db;
  window.auth = auth;
</script>
</body>
</html>
